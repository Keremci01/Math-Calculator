<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math App</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
</head>

<body>

<!-- HAMBURGER -->
<div id="hamburger" onclick="toggleMenu()">☰</div>

<!-- MENU -->
<div id="menu">
  <h3>Menü</h3>
  <button onclick="setMode('function')">Fonksiyon</button>
  <button onclick="setMode('integral')">İntegral</button>
  <button onclick="setMode('calculator')">Hesap Makinesi</button>
</div>

<!-- CONTENT -->
<div id="content">

  <h2 id="title">Fonksiyon</h2>

  <!-- FONKSİYON -->
  <div id="functionInputs">
    <input id="func" placeholder="x^2">
  </div>

  <!-- İNTEGRAL -->
  <div id="integralInputs" style="display:none;">
    <input id="intFunc" placeholder="x^2">
    <input id="a" placeholder="a">
    <input id="b" placeholder="b">
  </div>

  <!-- CALCULATOR -->
  <div id="calculator" style="display:none;">
    <input id="calcDisplay" readonly>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;">
      <button onclick="calc('7')">7</button>
      <button onclick="calc('8')">8</button>
      <button onclick="calc('9')">9</button>
      <button onclick="calc('/')">÷</button>

      <button onclick="calc('4')">4</button>
      <button onclick="calc('5')">5</button>
      <button onclick="calc('6')">6</button>
      <button onclick="calc('*')">×</button>

      <button onclick="calc('1')">1</button>
      <button onclick="calc('2')">2</button>
      <button onclick="calc('3')">3</button>
      <button onclick="calc('-')">−</button>

      <button onclick="calc('0')">0</button>
      <button onclick="calc('.')">.</button>
      <button onclick="calculate()">=</button>
      <button onclick="calc('+')">+</button>

      <button onclick="clearCalc()">C</button>
    </div>
  </div>

  <!-- DRAW BUTTON -->
  <button id="drawBtn" onclick="draw()">Grafiği Çiz</button>

  <div id="plot"></div>
  <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
