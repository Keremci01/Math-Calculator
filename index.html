<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Math Calculator</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

.dark{
background:#121212;
color:white;
}

.dark #menu{
background:#0d1b2a;
}

.dark button{
background:#1e1e1e;
color:white;
}

.dark input{
background:#1e1e1e;
color:white;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid gray;
padding:5px;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="setMode('function')">Fonksiyon Grafiği</button>
<button onclick="setMode('derivative')">Türev Grafiği</button>
<button onclick="setMode('integral')">İntegral Alanı</button>
<button onclick="setMode('tangent')">Teğet Doğrusu</button>
<button onclick="setMode('limit')">Limit Grafiği</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">
<input id="x0" type="number" placeholder="x noktası" style="display:none">

<button onclick="draw()">Grafiği Çiz</button>
<button onclick="calculateDistance()">Mesafeyi Hesapla</button>
<button onclick="downloadPNG()">PNG indir</button>
<button onclick="createTable()">Fonksiyon Tablosu</button>

<div id="plot"></div>

<div id="distanceResult" style="margin-top:15px"></div>

<div id="table"></div>

<hr style="margin:40px 0">

<h2>AI Matematik Asistanı</h2>

<input id="aiInput" placeholder="Matematik sorusu yaz">
<button onclick="askAI()">Sor</button>

<div id="aiAnswer" style="margin-top:20px"></div>

</div>

<script>

const API_KEY="YOUR_API_KEY";

let mode="function";
let points=[];

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="block" ? "none" : "block";
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function setMode(m){

mode=m;

toggleMenu();

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";
document.getElementById("x0").style.display="none";

if(mode==="function"){
title.innerText="Fonksiyon Grafiği";
}

if(mode==="derivative"){
title.innerText="Türev Grafiği";
}

if(mode==="integral"){
title.innerText="İntegral Alanı";
a.style.display="inline";
b.style.display="inline";
}

if(mode==="tangent"){
title.innerText="Teğet Doğrusu";
x0.style.display="inline";
}

if(mode==="limit"){
title.innerText="Limit Grafiği";
x0.style.display="inline";
}

draw();

}

function draw(){

document.getElementById("plot").innerHTML="";

let funcs=document.getElementById("func").value.split(",");

let width=document.getElementById("content").offsetWidth-120;

let data=[];

for(let f of funcs){
data.push({fn:f.trim()});
}

try{

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:data
});

setTimeout(addClickEvent,200);

}catch(e){
console.log(e);
}

}

function addClickEvent(){

let svg=document.querySelector("#plot svg");

if(!svg) return;

svg.onclick=function(e){

let rect=svg.getBoundingClientRect();

let x=(e.clientX-rect.left)/rect.width*20-10;
let y=10-(e.clientY-rect.top)/rect.height*20;

points.push({x,y});

let circle=document.createElementNS("http://www.w3.org/2000/svg","circle");

circle.setAttribute("cx",e.clientX-rect.left);
circle.setAttribute("cy",e.clientY-rect.top);
circle.setAttribute("r",5);
circle.setAttribute("fill","red");

svg.appendChild(circle);

};

}

function calculateDistance(){

if(points.length<2){
distanceResult.innerText="İki nokta seç.";
return;
}

let p1=points[points.length-1];
let p2=points[points.length-2];

let d=Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2);

distanceResult.innerText="Mesafe: "+d.toFixed(4);

}

function createTable(){

let f=document.getElementById("func").value;

let table="<table><tr><th>x</th><th>f(x)</th></tr>";

for(let x=-5;x<=5;x++){

let y;

try{
y=math.evaluate(f,{x:x});
}catch{
y="err";
}

table+=`<tr><td>${x}</td><td>${y}</td></tr>`;

}

table+="</table>";

document.getElementById("table").innerHTML=table;

}

function downloadPNG(){

let svg=document.querySelector("#plot svg");

let serializer=new XMLSerializer();
let source=serializer.serializeToString(svg);

let img=new Image();

let canvas=document.createElement("canvas");

canvas.width=800;
canvas.height=400;

let ctx=canvas.getContext("2d");

img.onload=function(){

ctx.drawImage(img,0,0);

let a=document.createElement("a");

a.download="grafik.png";
a.href=canvas.toDataURL();

a.click();

};

img.src="data:image/svg+xml;base64,"+btoa(source);

}

async function askAI(){

let q=document.getElementById("aiInput").value;

aiAnswer.innerText="AI düşünüyor...";

try{

let response=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:"Bir matematik öğretmeni gibi adım adım çöz: "+q
}
]
}
]
})
});

let data=await response.json();

if(data.candidates){
aiAnswer.innerText=data.candidates[0].content.parts[0].text;
}else{
aiAnswer.innerText="AI cevap veremedi.";
}

}catch(e){

aiAnswer.innerText="Bağlantı hatası.";

}

}

window.onload=draw;

</script>

</body>
</html>
