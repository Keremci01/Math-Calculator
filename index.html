<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Math Graph</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

#hamburger{
font-size:26px;
position:fixed;
top:10px;
left:10px;
background:white;
padding:8px 12px;
cursor:pointer;
border-radius:8px;
}

#menu{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#111827;
color:white;
padding:20px;
padding-top:60px;
display:none;
}

#menu button{
width:100%;
margin:6px 0;
padding:10px;
background:#1f2937;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#menu button:hover{
background:#2563eb;
}

#content{
margin-left:60px;
padding:40px;
}

input{
padding:8px;
margin:4px;
}

#plot{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
}

.dark{
background:#121212;
color:white;
}

.dark #plot{
background:#1e1e1e;
}

</style>
</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleFunctions()">Fonksiyonlar ▼</button>

<div id="functionsMenu" style="display:none">

<button onclick="setMode('function')">Fonksiyon Grafiği</button>

<button onclick="setMode('table')">Fonksiyon Tablosu</button>

<button onclick="setMode('point')">Nokta Ekle</button>

<button onclick="setMode('distance')">İki Nokta Mesafe</button>

</div>

<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('limit')">Limit</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" placeholder="a" style="display:none">
<input id="b" placeholder="b" style="display:none">

<input id="x0" placeholder="x noktası" style="display:none">

<button onclick="draw()">Grafiği Çiz</button>

<button onclick="downloadPNG()">PNG indir</button>

<div id="plot"></div>

<div id="table"></div>

</div>

<script>

let mode="function";
let points=[];

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="block" ? "none":"block";
}

function toggleFunctions(){
let m=document.getElementById("functionsMenu");
m.style.display = m.style.display==="block" ? "none":"block";
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function setMode(m){

mode=m;

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";
document.getElementById("x0").style.display="none";

if(mode==="integral"){
a.style.display="inline";
b.style.display="inline";
}

if(mode==="tangent" || mode==="limit"){
x0.style.display="inline";
}

draw();

}

function draw(){

document.getElementById("plot").innerHTML="";
document.getElementById("table").innerHTML="";

let f=document.getElementById("func").value;

let width=700;

let data=[];

try{

if(mode==="function"){
data=[{fn:f}];
}

if(mode==="derivative"){
let d=math.derivative(f,"x").toString();
data=[{fn:d,color:"red"}];
}

if(mode==="integral"){

let A=parseFloat(a.value);
let B=parseFloat(b.value);

data=[
{fn:f},
{fn:f,range:[A,B],closed:true,color:"skyblue"}
];

}

if(mode==="tangent"){

let X=parseFloat(x0.value);

let y=math.evaluate(f,{x:X});

let d=math.derivative(f,"x").toString();

let slope=math.evaluate(d,{x:X});

let t=`${slope}*(x-${X})+${y}`;

data=[
{fn:f},
{fn:t,color:"red"},
{points:[[X,y]],fnType:"points"}
];

}

if(mode==="limit"){

let X=parseFloat(x0.value);

data=[
{fn:f},
{fn:`${X}`,range:[-10,10],color:"red"}
];

}

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:data
});

if(mode==="table"){

let html="<table border='1'><tr><th>x</th><th>f(x)</th></tr>";

for(let i=-5;i<=5;i++){

let y=math.evaluate(f,{x:i});

html+=`<tr><td>${i}</td><td>${y}</td></tr>`;

}

html+="</table>";

document.getElementById("table").innerHTML=html;

}

}catch(e){
console.log(e);
}

}

function downloadPNG(){

let svg=document.querySelector("#plot svg");

let serializer=new XMLSerializer();

let source=serializer.serializeToString(svg);

let img=new Image();

img.src="data:image/svg+xml;base64,"+btoa(source);

let canvas=document.createElement("canvas");

canvas.width=800;
canvas.height=500;

let ctx=canvas.getContext("2d");

img.onload=function(){

ctx.drawImage(img,0,0);

let a=document.createElement("a");

a.download="graph.png";

a.href=canvas.toDataURL("image/png");

a.click();

}

}

window.onload=draw;

</script>

</body>
</html>
