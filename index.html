<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

/* GENEL */
body{
font-family:'Segoe UI', Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#eef2ff,#e0f2fe);
color:#1f2937;
}

/* DARK */
.dark{
background:#121212;
color:white;
}
.dark #plot{background:#1e1e1e;}
.dark #menu{background:#0d1b2a;}

/* MENU */
#menu{
position:fixed;
top:0;
left:0;
width:250px;
height:100%;
background:#111827;
color:white;
padding:25px;
padding-top:80px;
transform:translateX(-100%);
transition:0.3s;
}
#menu.active{transform:translateX(0);}

/* MENU BUTTON */
#menu button{
width:100%;
padding:12px;
margin:10px 0;
background:#1f2937;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
font-family:'Segoe UI', Arial, sans-serif;
}
#menu button:hover{
background:#2563eb;
transform:translateX(5px);
}

/* CONTENT */
#content{
margin-left:60px;
padding:40px;
}

/* TOP BUTTONS */
#topButtons{
margin-bottom:20px;
display:flex;
gap:10px;
}

/* BUTTON */
button{
background:#2563eb;
color:white;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}
button:hover{
background:#1e40af;
}

/* GRAPH */
#plot{
margin-top:20px;
width:100%;
height:500px;
background:white;
border-radius:16px;
}

/* TABLE */
table,td,th{
border:1px solid #ccc;
}
td,th{
padding:6px;
text-align:center;
}

</style>

</head>

<body>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleGroup('funcGroup')">Fonksiyonlar ▼</button>

<div id="funcGroup" style="display:none">
<button onclick="setMode('function')">Fonksiyon Grafiği</button>
<button onclick="setMode('multi')">Çoklu Fonksiyon Çizme</button>
</div>

<button onclick="toggleGroup('analysisGroup')">Analiz ▼</button>

<div id="analysisGroup" style="display:none">
<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('limit')">Limit</button>
<button onclick="setMode('distance')">İki Nokta Arası Mesafe</button>
</div>

<button onclick="setMode('calculator')">🧮 Hesap Makinesi</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">
<input id="func2" style="display:none">
<input id="func3" style="display:none">

<input id="a" placeholder="a" style="display:none">
<input id="b" placeholder="b" style="display:none">

<input id="x0" placeholder="x0" style="display:none">

<input id="x1" placeholder="x1" style="display:none">
<input id="y1" placeholder="y1" style="display:none">
<input id="x2" placeholder="x2" style="display:none">
<input id="y2" placeholder="y2" style="display:none">

<div id="topButtons">
<button onclick="draw()">Grafiği Çiz</button>
<button onclick="downloadPNG()">PNG İndir</button>
<button id="intersectBtn" onclick="findIntersections()" style="display:none">Kesişim Bul</button>
</div>

<div id="plot"></div>

<div id="result"></div>
<div id="tableContainer"></div>

<!-- CALCULATOR -->
<div id="calculator" style="display:none;margin-top:20px;">
<input id="calcDisplay" style="width:200px;margin-bottom:10px;"><br>

<button onclick="calc('7')">7</button>
<button onclick="calc('8')">8</button>
<button onclick="calc('9')">9</button>
<button onclick="calc('/')">÷</button><br>

<button onclick="calc('4')">4</button>
<button onclick="calc('5')">5</button>
<button onclick="calc('6')">6</button>
<button onclick="calc('*')">×</button><br>

<button onclick="calc('1')">1</button>
<button onclick="calc('2')">2</button>
<button onclick="calc('3')">3</button>
<button onclick="calc('-')">-</button><br>

<button onclick="calc('0')">0</button>
<button onclick="calc('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="calc('+')">+</button><br>

<button onclick="clearCalc()">GG</button>
</div>

</div>

<script>

/* MODE */
let mode="function"

function toggleGroup(id){
let g=document.getElementById(id)
g.style.display = g.style.display==="block" ? "none":"block"
}

function toggleDark(){
document.body.classList.toggle("dark")
}

function setMode(m){
mode=m

document.getElementById("calculator").style.display="none"
document.getElementById("plot").style.display="block"

intersectBtn.style.display=(m==="multi")?"inline-block":"none"

title.innerText={
function:"Fonksiyon Grafiği",
multi:"Çoklu Fonksiyon Çizme",
derivative:"Türev",
integral:"İntegral",
tangent:"Teğet",
limit:"Limit",
distance:"İki Nokta Arası Mesafe",
calculator:"Hesap Makinesi"
}[m]

if(m==="calculator"){
calculator.style.display="block"
plot.style.display="none"
}

draw()
}

/* DRAW */
function draw(){
let f=func.value

try{
let data=[{fn:f}]

if(mode==="multi"){
if(func2.value) data.push({fn:func2.value})
if(func3.value) data.push({fn:func3.value})
}

functionPlot({
target:"#plot",
width:plot.clientWidth,
height:500,
grid:true,
data:data
})

}catch(e){
result.innerHTML=e.message
}
}

/* INTERSECTION */
function findIntersections(){
let f1=func.value
let f2=func2.value

let pts=[]
let rows=""

for(let i=-50;i<=50;i+=0.1){
try{
let y1=math.evaluate(f1,{x:i})
let y2=math.evaluate(f2,{x:i})

if(Math.abs(y1-y2)<0.15){
pts.push([i,y1])
rows+=`<tr><td>${i.toFixed(2)}</td><td>${y1.toFixed(2)}</td></tr>`
}
}catch{}
}

functionPlot({
target:"#plot",
width:plot.clientWidth,
height:500,
data:[
{fn:f1},
{fn:f2},
{points:pts,fnType:"points"}
]
})

tableContainer.innerHTML=`<table><tr><th>X</th><th>Y</th></tr>${rows}</table>`
}

/* CALC */
function calc(v){calcDisplay.value+=v}
function calculate(){calcDisplay.value=math.evaluate(calcDisplay.value)}
function clearCalc(){calcDisplay.value=""}

/* PNG */
function downloadPNG(){
alert("PNG indir aktif 👍")
}

/* AUTO */
window.onload=()=>setTimeout(draw,100)

</script>

</body>
</html>
