<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Math Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

#hamburger{
font-size:28px;
position:fixed;
top:10px;
left:10px;
cursor:pointer;
background:white;
padding:8px 12px;
border-radius:6px;
}

#menu{
display:none;
position:fixed;
top:50px;
left:10px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#menu button{
display:block;
margin:10px 0;
width:150px;
}

#content{
margin-left:120px;
padding:40px;
}

#plot{
margin-top:30px;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="setMode('function')">Fonksiyon</button>
<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">
<input id="x0" type="number" placeholder="x noktası" style="display:none">

<button onclick="draw()">Grafiği Çiz</button>

<div id="plot"></div>

<hr style="margin:40px 0">

<h2>AI Matematik Asistanı</h2>

<input id="aiInput" placeholder="Matematik sorusu yaz">
<button onclick="askAI()">Sor</button>

<div id="aiAnswer" style="margin-top:20px"></div>

</div>

<script>

let mode="function";

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="block" ? "none" : "block";
}

function setMode(m){

mode=m;

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";
document.getElementById("x0").style.display="none";

if(mode==="function"){
document.getElementById("title").innerText="Fonksiyon Grafiği";
}

if(mode==="derivative"){
document.getElementById("title").innerText="Türev Grafiği";
}

if(mode==="integral"){
document.getElementById("title").innerText="İntegral Alanı";
document.getElementById("a").style.display="inline";
document.getElementById("b").style.display="inline";
}

if(mode==="tangent"){
document.getElementById("title").innerText="Teğet Doğrusu";
document.getElementById("x0").style.display="inline";
}

draw();

}

function draw(){

document.getElementById("plot").innerHTML="";

let f=document.getElementById("func").value;

let width=600;

try{

if(mode==="function"){

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f}
]
});

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString();

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:d}
]
});

}

if(mode==="integral"){

let a=parseFloat(document.getElementById("a").value);
let b=parseFloat(document.getElementById("b").value);

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f,color:"black"},
{fn:f,range:[a,b],closed:true,color:"skyblue"}
]
});

}

if(mode==="tangent"){

let x0=parseFloat(document.getElementById("x0").value);

let f0=math.evaluate(f,{x:x0});
let d=math.derivative(f,"x").toString();
let slope=math.evaluate(d,{x:x0});

let tangent=`${slope}*(x-${x0})+${f0}`;

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f,color:"black"},
{fn:tangent,color:"red"},
{points:[[x0,f0]],fnType:"points",color:"red"}
]
});

}

}catch(e){
console.log(e);
}

}

async function askAI(){

let q=document.getElementById("aiInput").value;

document.getElementById("aiAnswer").innerText="AI düşünüyor...";

try{

let response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyAZocNHOfHLnIctWWsDmehkTgIlzxXipkY",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:"Bir matematik öğretmeni gibi adım adım çöz: "+q
}
]
}
]
})
});

let data=await response.json();

if(data.candidates){

let ans=data.candidates[0].content.parts[0].text;

document.getElementById("aiAnswer").innerText=ans;

}else{

document.getElementById("aiAnswer").innerText="AI cevap veremedi.";

}

}catch(e){

document.getElementById("aiAnswer").innerText="Bağlantı hatası.";

}

}

window.onload=draw;

</script>

</body>
</html>
