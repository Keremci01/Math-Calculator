<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Math Tool</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* hamburger */

#hamburger{
font-size:28px;
position:fixed;
top:12px;
left:12px;
cursor:pointer;
background:white;
padding:8px 12px;
border-radius:6px;
z-index:1001;
}

/* menu */

#menu{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#1f1f1f;
color:white;
padding:25px;
padding-top:70px;
display:none;
z-index:1000;
}

#menu button{
width:100%;
padding:12px;
margin:10px 0;
font-size:15px;
border:none;
border-radius:6px;
background:#2e2e2e;
color:white;
cursor:pointer;
}

/* content */

#content{
margin-left:60px;
padding:25px;
}

#plot{
width:800px;
height:500px;
margin-top:20px;
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="showGraph()">Fonksiyon Grafiği</button> <button onclick="showDerivative()">Türev Grafiği</button> <button onclick="showIntegral()">İntegral Alanı</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" type="number" placeholder="a" style="display:none">

<input id="b" type="number" placeholder="b" style="display:none">

<button onclick="drawGraph()">Grafiği Çiz</button>

<div id="plot"></div>

</div>

<script>

let mode="function";

function toggleMenu(){

var m=document.getElementById("menu");

if(m.style.display==="block"){
m.style.display="none";
}else{
m.style.display="block";
}

}

function showGraph(){

mode="function";

document.getElementById("title").innerHTML="Fonksiyon Grafiği";

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";

toggleMenu();

draw();

}

function showDerivative(){

mode="derivative";

document.getElementById("title").innerHTML="Türev Grafiği";

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";

toggleMenu();

drawDerivative();

}

function showIntegral(){

mode="integral";

document.getElementById("title").innerHTML="İntegral Alanı";

document.getElementById("a").style.display="inline";
document.getElementById("b").style.display="inline";

toggleMenu();

}

function drawGraph(){

if(mode==="function"){
draw();
}

if(mode==="derivative"){
drawDerivative();
}

if(mode==="integral"){
drawIntegral();
}

}

function draw(){

var f=document.getElementById("func").value;

functionPlot({
target:'#plot',
width:800,
height:500,
grid:true,
data:[
{fn:f}
]
});

}

function drawDerivative(){

var f=document.getElementById("func").value;

var d=math.derivative(f,"x").toString();

functionPlot({
target:'#plot',
width:800,
height:500,
grid:true,
data:[
{fn:d}
]
});

}

function drawIntegral(){

var f=document.getElementById("func").value;

var a=parseFloat(document.getElementById("a").value);
var b=parseFloat(document.getElementById("b").value);

functionPlot({

target:'#plot',
width:800,
height:500,
grid:true,

data:[

{
fn:f,
graphType:"polyline"
},

{
fn:f,
range:[a,b],
closed:true,
color:"red"
}

]

});

}

window.onload=draw;

</script>

</body>
</html>
